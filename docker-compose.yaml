services:
  nginx_proxy:
    image: nginx:alpine
    container_name: nginxProxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - client_analysis
      - server_analysis
    networks:
      - app_network
    restart: unless-stopped

  server_analysis:
    container_name: serverAnalysis
    build:
      context: ./server
      dockerfile: DockerfileServer
    env_file:
      - ./server/.development.env
    volumes:
      - ./server/uploads:/app/server/uploads
    expose:
      - "5050"
    depends_on:
      postgres_analysis:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  postgres_analysis:
    container_name: postgresAnalysis
    image: postgres:18
    env_file:
      - ./.postgres.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  client_analysis:
    container_name: clientAnalysis
    build:
      context: ./client
      dockerfile: DockerfileClient
    expose:
      - "80"
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  pgdata: