services:
  nginx_proxy:
    image: nginx:alpine
    container_name: nginxProxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client_analysis
    networks:
      - app_network
    restart: unless-stopped

  server_analysis:
    container_name: serverAnalysis
    build:
      context: ./server
      dockerfile: DockerfileServer
    env_file:
      - ./server/.development.env
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    ports:
      - "5050:5050"
      - "9229:9229"
    depends_on:
      postgres_analysis:
        condition: service_healthy
    networks:
      - app_network

  postgres_analysis:
    container_name: postgresAnalysis
    image: postgres:18
    env_file:
      - ./.postgres.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  client_analysis:
    container_name: clientAnalysis
    build:
      context: ./client
      dockerfile: DockerfileClient
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
volumes:
  pgdata: