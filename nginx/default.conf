server {
    # Блок 1: Перенаправление всего HTTP на HTTPS
    listen 80;
    server_name proanalize.ru; # Замените на ваш реальный домен
    # Возвращаем постоянное перенаправление на HTTPS-версию сайта
    return 301 https://$host$request_uri;
}

server {
    # Блок 2: Основной HTTPS-сервер
    listen 443;
    http2 on; # Рекомендуется включить HTTP/2 для производительности [citation:4]
    server_name proanalize.ru; # Замените на ваш реальный домен

    # --- Укажите пути к SSL-сертификатам внутри контейнера ---
    # Это папка, которую мы смонтировали в качестве тома (./nginx/ssl)
    #ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Рекомендуемые настройки безопасности SSL (опционально, но желательно)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # --- Проксирование запросов к Vite-серверу ---
    location / {
        # Vite сервер внутри сети доступен по имени контейнера и порту
        proxy_pass http://client_analysis:5173;
        proxy_http_version 1.1;

        # Эти заголовки критически важны для работы WebSocket (HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Передаем реальный IP и хост исходного запроса
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключаем буферизацию для Server-Sent Events, если нужно
        proxy_buffering off;
    }
}