services:
  nginx:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro  # опционально
    restart: unless-stopped
    networks:
      - test-network

networks:
  test-network:
    driver: bridge