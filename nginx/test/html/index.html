<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ VPS работает!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #333;
            font-size: 42px;
            margin-bottom: 20px;
        }
        .success {
            color: #4caf50;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
            font-family: 'Courier New', monospace;
        }
        .info p {
            margin: 10px 0;
            color: #555;
        }
        .status {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="success">✓</div>
    <h1>VPS работает успешно!</h1>
    <p>Docker Compose + Nginx контейнер запущен</p>

    <div class="info">
        <p><strong>📅 Дата/время:</strong> <span id="datetime"></span></p>
        <p><strong>🌍 IP сервера:</strong> <span id="server-ip">загрузка...</span></p>
        <p><strong>🐳 Контейнер:</strong> nginx-test</p>
        <p><strong>🔧 Порт:</strong> 80</p>
    </div>

    <div class="status">🌐 Сервер активен</div>
    <div class="footer">Проверка работоспособности VPS | Docker Compose</div>
</div>

<script>
  // Текущая дата и время
  const now = new Date();
  document.getElementById('datetime').innerHTML = now.toLocaleString('ru-RU');

  // Получение IP сервера
  fetch('https://api.ipify.org?format=json')
    .then(response => response.json())
    .then(data => {
      document.getElementById('server-ip').innerHTML = data.ip;
    })
    .catch(() => {
      document.getElementById('server-ip').innerHTML = 'не определен (проверьте DNS)';
    });
</script>
</body>
</html>
